<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý VoucherCT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../script/voucherct.js" defer></script>
</head>
<body class="container py-4">

<h2 class="mb-4 text-center">🔖 Quản Lý VoucherCT</h2>

<!-- 🔍 Bộ lọc -->
<div class="card mb-4">
    <div class="card-body row g-2">
        <div class="col-md-3">
            <input type="text" class="form-control" id="filter_idvc" placeholder="ID Voucher">
        </div>
        <div class="col-md-3">
            <input type="text" class="form-control" id="filter_idkh" placeholder="ID Khách Hàng">
        </div>
        <div class="col-md-3">
            <input type="text" class="form-control" id="filter_idhd" placeholder="ID Hóa Đơn">
        </div>
        <div class="col-md-3 d-flex gap-2">
            <button class="btn btn-primary flex-fill" onclick="loadVoucherCT()">🔍 Tìm kiếm</button>
            <button class="btn btn-warning" onclick="clearFilters()">🧹</button>
            <button class="btn btn-success" onclick="showCreateForm()">➕ Thêm</button>
        </div>
    </div>
</div>

<!-- 📋 Danh sách -->
<div id="listSection">
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID Voucher</th>
            <th>Khách Hàng</th>
            <th>Hóa Đơn</th>
            <th>Trạng Thái</th>
            <th>Ngày Tạo</th>
            <th>Hành Động</th>
        </tr>
        </thead>
        <tbody id="voucherctTableBody">
        <!-- Dữ liệu sẽ được render bằng JavaScript -->
        </tbody>
    </table>

    <!-- 📄 Phân trang -->
    <nav>
        <ul class="pagination" id="pagination"></ul>
    </nav>
</div>

<!-- 📝 Form thêm/sửa -->
<div id="formSection" class="card" style="display: none;">
    <div class="card-header bg-info text-white">
        <strong id="formTitle">Thêm mới</strong>
    </div>
    <div class="card-body">
        <form id="voucherctForm" onsubmit="submitForm(event)">
            <input type="hidden" id="id">

            <div class="mb-3">
                <label for="idvc" class="form-label">ID Voucher</label>
                <input type="text" class="form-control" id="idvc" required>
            </div>
            <div class="mb-3">
                <label for="idkh" class="form-label">ID Khách Hàng</label>
                <input type="text" class="form-control" id="idkh" required>
            </div>
            <div class="mb-3">
                <label for="idhd" class="form-label">ID Hóa Đơn</label>
                <input type="text" class="form-control" id="idhd">
            </div>
            <div class="mb-3">
                <label for="trangthai" class="form-label">Trạng Thái</label>
                <select class="form-select" id="trangthai">
                    <option value="0">Chưa dùng</option>
                    <option value="1">Đã dùng</option>
                </select>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label for="ngaytao" class="form-label">Ngày tạo</label>
                    <input type="datetime-local" class="form-control" id="ngaytao" readonly>
                </div>
                <div class="col">
                    <label for="ngaysua" class="form-label">Ngày sửa</label>
                    <input type="datetime-local" class="form-control" id="ngaysua" readonly>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-primary">💾 Lưu</button>
                <button type="button" class="btn btn-secondary" onclick="hideForm()">❌ Hủy</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
